version: '3.8'

services:
  # Serenity Chatbot FastAPI Backend API
  api-server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: serenity-api-server
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - DATABASE_URL=sqlite:///./mental_health.db
      - ENABLE_TELEMETRY=True
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4318
      - OTEL_SERVICE_NAME=serenity-chatbot-backend
    volumes:
      - ./mental_health.db:/app/mental_health.db
    depends_on:
      - otel-collector
    networks:
      - serenity-network

  # OpenTelemetry Collector Contrib to buffer and export events to Axiom
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.95.0
    container_name: serenity-otel-collector
    command: ["--config=/etc/otel-collector-config.yaml"]
    volumes:
      - ./otel-collector-config.yaml:/etc/otel-collector-config.yaml
    env_file:
      - .env
    ports:
      - "4317:4317" # OTLP gRPC receiver
      - "4318:4318" # OTLP HTTP receiver
    networks:
      - serenity-network

networks:
  serenity-network:
    driver: bridge
